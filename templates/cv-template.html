<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'EB Garamond';
    src: url('./fonts/eb-garamond-regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: 'EB Garamond';
    src: url('./fonts/eb-garamond-bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: 'EB Garamond';
    src: url('./fonts/eb-garamond-italic.ttf') format('truetype');
    font-weight: 400;
    font-style: italic;
    font-display: block;
  }
  @font-face {
    font-family: 'EB Garamond';
    src: url('./fonts/eb-garamond-bold-italic.ttf') format('truetype');
    font-weight: 700;
    font-style: italic;
    font-display: block;
  }
  @font-face {
    font-family: 'Roboto Mono';
    src: url('./fonts/roboto-mono-regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'EB Garamond', 'Times New Roman', Times, serif;
    font-size: 10pt;
    line-height: 1.15;
    color: #000;
    background: #fff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0.3in 0.5in;
  }

  /* === HEADER === */
  .header { text-align: center; margin-bottom: 2pt; }

  .name {
    font-family: 'EB Garamond', 'Times New Roman', Times, serif;
    font-size: 15pt;
    font-weight: 700;
    line-height: 1.1;
    margin: 0 0 1pt 0;
    color: #000;
  }

  .contact-row {
    font-size: 10pt;
    line-height: 1.3;
    color: #000;
  }

  .contact-row a {
    color: #1155cc;
    text-decoration: underline;
    font-weight: 400;
  }

  .contact-row .sep { color: #000; padding: 0 2pt; }

  /* === OPTIONAL SUMMARY (no header label) === */
  .summary-section { margin-top: 3pt; }
  .summary-line { font-size: 10pt; line-height: 1.35; }
  .summary-line:empty { display: none; }
  .summary-section:has(.summary-line:empty) { display: none; }

  /* === SECTION === */
  .section { margin-top: 2pt; }

  .section-title {
    font-family: 'EB Garamond', 'Times New Roman', Times, serif;
    font-size: 12.5pt;
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 0.6pt solid #000;
    padding-bottom: 1pt;
    margin-bottom: 2pt;
    line-height: 1.15;
    color: #000;
  }

  /* Inline link inside section title (e.g., "PROJECTS: Github") */
  .section-title-link {
    font-family: 'Roboto Mono', monospace;
    font-size: 11pt;
    font-weight: 400;
    color: #1155cc;
    text-decoration: underline;
    text-transform: none;
    margin-left: 4pt;
  }

  /* === ITEM (job, project, oss) === */
  .item { margin-top: 1pt; }
  .item:first-child { margin-top: 1pt; }

  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12pt;
    font-size: 10pt;
    line-height: 1.25;
    margin-bottom: 0;
  }

  .item-title { font-weight: 700; color: #000; }
  .item-context { font-style: italic; font-weight: 400; color: #000; }

  .item-date {
    font-family: 'Times New Roman', Times, serif;
    font-style: normal;
    font-weight: 400;
    white-space: nowrap;
    color: #000;
  }

  .item-date-bold { font-weight: 700; }

  /* === BULLETS === */
  ul {
    margin: 0;
    padding-left: 22pt;
    list-style-type: disc;
  }
  ul li {
    font-size: 10pt;
    line-height: 1.15;
    margin: 0;
    color: #000;
  }
  ul li strong { font-weight: 700; }

  /* === LINKS === */
  a {
    color: #1155cc;
    text-decoration: underline;
    font-weight: 400;
  }

  /* === EDUCATION === */
  .edu-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12pt;
    font-size: 10pt;
    line-height: 1.2;
    margin-top: 1pt;
  }
  .edu-school { font-weight: 700; }
  .edu-degree { font-style: italic; }
  .edu-date { font-weight: 700; white-space: nowrap; }

  /* === ADDITIONAL INFO (Skills/Certs/Awards combined as bullets) === */
  .additional-info ul {
    padding-left: 22pt;
  }
  .additional-info li { font-size: 10pt; line-height: 1.15; margin: 0; }
  .additional-info li strong { font-weight: 700; }

  /* === PRINT === */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0.25in 0.5in 0.2in 0.5in; }
  }

  .avoid-break, .item, .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .section-title {
    break-after: avoid;
    page-break-after: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <div class="name">{{NAME}}</div>
    <div class="contact-row">
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a> <span class="sep">&bull;</span> {{LOCATION}} <span class="sep">&bull;</span> {{PHONE}} <span class="sep">&bull;</span> <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
    </div>
  </div>

  <!-- OPTIONAL SUMMARY (1-line, no header label, hidden when empty) -->
  <div class="summary-section">
    <div class="summary-line">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- SECTIONS (composed by build script in JD-appropriate order) -->
  {{SECTIONS}}

</div>
</body>
</html>
